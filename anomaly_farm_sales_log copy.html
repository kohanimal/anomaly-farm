<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Anomaly Farm — Sales Log</title>
<style>
  :root {
    --green-dark: #2D5016;
    --green-mid:  #4F7A28;
    --green-light:#C6EFCE;
    --green-pale: #EBF1DE;
    --amber:      #F9A825;
    --amber-pale: #FFF8E1;
    --red:        #C62828;
    --red-pale:   #FFEBEE;
    --blue:       #1565C0;
    --blue-pale:  #E3F2FD;
    --text:       #1a1a1a;
    --muted:      #666;
    --border:     #ddd;
    --bg:         #f5f5f0;
    --white:      #fff;
    --radius:     12px;
    --shadow:     0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--green-dark); color: #fff; padding: 16px 20px;
           display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; font-weight: 700; }
  header p  { font-size: 12px; opacity: .7; margin-top: 2px; }

  nav { background: var(--green-dark); display: flex; border-top: 1px solid rgba(255,255,255,.12); }
  nav button { flex: 1; padding: 11px 4px; background: none; border: none;
               color: rgba(255,255,255,.6); font-size: 13px; font-weight: 600;
               cursor: pointer; border-bottom: 3px solid transparent; }
  nav button.active { color: #fff; border-bottom-color: var(--amber); }

  .page { display: none; padding: 16px; max-width: 520px; margin: 0 auto; }
  .page.active { display: block; }

  /* Cards */
  .card { background: var(--white); border-radius: var(--radius);
          padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--muted);
                text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  /* Toggle button groups */
  .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-btn { flex: 1; min-width: 80px; padding: 10px 8px; border: 2px solid var(--border);
                border-radius: 10px; background: var(--white); font-size: 14px;
                font-weight: 600; cursor: pointer; text-align: center; transition: all .15s; }
  .toggle-btn.active { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }

  /* Inputs */
  label.field-label { display: block; font-size: 12px; font-weight: 700;
                      color: var(--muted); text-transform: uppercase;
                      letter-spacing: .05em; margin-bottom: 6px; margin-top: 14px; }
  input[type=text], input[type=number] {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 16px; background: var(--white);
    appearance: none; -webkit-appearance: none; }
  input:focus { outline: none; border-color: var(--green-mid); }
  textarea { width: 100%; padding: 10px 14px; border: 2px solid var(--border);
             border-radius: 10px; font-size: 14px; resize: none; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--green-mid); }

  /* Veg product grid */
  .veg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .veg-product { border: 2px solid var(--border); border-radius: 10px;
                 padding: 10px; background: var(--white); }
  .veg-product.selected { border-color: var(--green-mid); background: var(--green-pale); }
  .veg-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .veg-tiers { display: flex; gap: 6px; flex-wrap: wrap; }
  .veg-tier { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px;
              font-size: 12px; font-weight: 600; cursor: pointer; background: var(--white);
              transition: all .12s; }
  .veg-tier.active { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }

  /* Primary button */
  .btn-primary { width: 100%; padding: 14px; background: var(--green-mid);
                 color: #fff; border: none; border-radius: 10px; font-size: 16px;
                 font-weight: 700; cursor: pointer; margin-top: 16px; letter-spacing: .02em; }
  .btn-primary:active { background: var(--green-dark); }
  .btn-outline { padding: 8px 16px; border: 2px solid var(--border); border-radius: 8px;
                 background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-danger  { padding: 4px 10px; border: none; border-radius: 6px;
                 background: var(--red-pale); color: var(--red); font-size: 12px;
                 font-weight: 600; cursor: pointer; }
  .btn-copy { padding: 10px 20px; background: var(--green-mid); color: #fff; border: none;
              border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* Sale list */
  .sale-item { display: flex; justify-content: space-between; align-items: center;
               padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .sale-item:last-child { border-bottom: none; }
  .sale-main  { font-size: 14px; font-weight: 600; }
  .sale-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sale-price { font-size: 16px; font-weight: 700; color: var(--green-mid); white-space:nowrap; margin-left:12px; }

  /* Summary row */
  .summary-row { display: flex; justify-content: space-between;
                 padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row.total { font-weight: 700; font-size: 16px; margin-top: 4px; }

  /* Tag */
  .tag { display: inline-block; border-radius: 10px; padding: 2px 8px;
         font-size: 11px; font-weight: 700; }
  .tag-green { background: var(--green-light); color: var(--green-dark); }
  .tag-amber { background: var(--amber-pale); color: #795900; }
  .tag-blue  { background: var(--blue-pale);  color: var(--blue); }
  .tag-grey  { background: #eee; color: #555; }

  /* Export box */
  .export-box { background: #f8f8f8; border: 1px solid var(--border); border-radius: 8px;
                padding: 12px; font-family: monospace; font-size: 12px; line-height: 1.6;
                white-space: pre-wrap; word-break: break-all; max-height: 260px; overflow-y: auto; }
  .export-section { margin-bottom: 16px; }
  .export-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted);
                       text-transform: uppercase; letter-spacing: .05em; }

  /* Month selector */
  .month-nav { display: flex; align-items: center; gap: 12px; justify-content: center;
               margin-bottom: 16px; }
  .month-nav button { padding: 6px 14px; border: 2px solid var(--border); border-radius: 8px;
                      background: var(--white); font-size: 16px; cursor: pointer; font-weight: 700; }
  .month-nav span { font-size: 16px; font-weight: 700; min-width: 140px; text-align: center; }

  /* Empty */
  .empty { text-align: center; padding: 32px 16px; color: var(--muted); }
  .empty .ico { font-size: 32px; margin-bottom: 8px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
           background: var(--green-dark); color: #fff; padding: 12px 22px; border-radius: 10px;
           font-size: 14px; font-weight: 600; transition: transform .25s; z-index: 999;
           pointer-events: none; white-space: nowrap; box-shadow: var(--shadow); }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: #eee; margin: 12px 0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌱 Anomaly Farm</h1>
    <p>Sales Log</p>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('log')">+ Log</button>
  <button onclick="showPage('today')">Today</button>
  <button onclick="showPage('monthly')">Monthly</button>
  <button onclick="showPage('export')">Export</button>
</nav>

<!-- ════════════════════════════ LOG SALE ════════════════════════════ -->
<div class="page active" id="page-log">

  <div class="card">
    <div class="card-title">Location</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="loc-f3"   onclick="setLoc('f3')">🏃 F3</button>
      <button class="toggle-btn"        id="loc-farm" onclick="setLoc('farm')">🏡 On-Farm</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Product</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="prod-eggs"    onclick="setProduct('eggs')">🥚 Eggs</button>
      <button class="toggle-btn"        id="prod-chicken" onclick="setProduct('chicken')">🐓 Chicken</button>
      <button class="toggle-btn"        id="prod-veg"     onclick="setProduct('veg')">🥬 Veg</button>
    </div>
  </div>

  <!-- Eggs inputs -->
  <div class="card" id="inputs-eggs">
    <label class="field-label">Dozens</label>
    <input type="number" id="eggs-qty" inputmode="decimal" placeholder="e.g. 2" min="0" step="0.5">
    <label class="field-label">Price per Dozen ($)</label>
    <input type="number" id="eggs-price" inputmode="decimal" placeholder="6.00" value="6" min="0" step="0.25">
  </div>

  <!-- Chicken inputs -->
  <div class="card" id="inputs-chicken" style="display:none">
    <label class="field-label">Weight (lbs)</label>
    <input type="number" id="chicken-qty" inputmode="decimal" placeholder="e.g. 4.5" min="0" step="0.1">
    <label class="field-label">Price per lb ($)</label>
    <input type="number" id="chicken-price" inputmode="decimal" placeholder="7.00" value="7" min="0" step="0.25">
  </div>

  <!-- Veg inputs -->
  <div class="card" id="inputs-veg" style="display:none">
    <div class="card-title">Select Product & Quantity</div>
    <div class="veg-grid" id="veg-grid"></div>
    <div id="veg-custom-wrap" style="display:none">
      <label class="field-label">Custom Qty</label>
      <input type="number" id="veg-custom-qty" inputmode="numeric" placeholder="1" min="1" step="1">
      <label class="field-label">Custom Price ($)</label>
      <input type="number" id="veg-custom-price" inputmode="decimal" placeholder="0.00" min="0" step="0.25">
    </div>
  </div>

  <div class="card">
    <label class="field-label">Customer Name <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
    <input type="text" id="sale-customer" placeholder="Who bought this?" autocomplete="off" list="customer-suggestions">
    <datalist id="customer-suggestions"></datalist>
    <label class="field-label" style="margin-top:12px">Notes <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
    <textarea id="sale-notes" rows="2" placeholder="Event, quantity notes, etc."></textarea>
  </div>

  <button class="btn-primary" onclick="logSale()">Log Sale</button>
</div>

<!-- ════════════════════════════ TODAY ════════════════════════════ -->
<div class="page" id="page-today">
  <div id="today-content"></div>
</div>

<!-- ════════════════════════════ MONTHLY ════════════════════════════ -->
<div class="page" id="page-monthly">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div id="monthly-content"></div>
</div>

<!-- ════════════════════════════ EXPORT ════════════════════════════ -->
<div class="page" id="page-export">
  <div id="export-content"></div>
</div>

<div id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const STORE_KEY      = 'anomaly_farm_sales_v1';
const CUSTOM_VEG_KEY = 'anomaly_farm_custom_veg_v1';
const CUSTOM_VEG_IDS = ['custom1','custom2','custom3'];
const CUSTOM_VEG_PRICES = [{qty:1,price:3},{qty:2,price:5}];

function loadCustomVeg() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_VEG_KEY)) || ['','','']; }
  catch(e) { return ['','','']; }
}
function saveCustomVegName(idx, name) {
  const names = loadCustomVeg();
  names[idx] = name;
  localStorage.setItem(CUSTOM_VEG_KEY, JSON.stringify(names));
}

const VEG_PRODUCTS = [
  { id: 'lettuce',     name: 'Lettuce Mix',  prices: [{qty:1,price:3},{qty:2,price:5}] },
  { id: 'microgreens', name: 'Microgreens',  prices: [{qty:1,price:6},{qty:2,price:10}] },
  { id: 'sungolds',    name: 'Sungolds',     prices: [{qty:1,price:3},{qty:2,price:5}] },
  { id: 'slicers',     name: 'Slicers',      prices: [{qty:1,price:3},{qty:2,price:5}] },
];

// ── State ──────────────────────────────────────────────────────────────────
let currentLoc     = 'f3';
let currentProduct = 'eggs';
let selectedVeg    = null; // { vegId, qty, price }
let viewMonth      = new Date(); // for monthly view

// ── Storage ────────────────────────────────────────────────────────────────
const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { return []; } };
const save = v  => localStorage.setItem(STORE_KEY, JSON.stringify(v));
const uid  = () => Date.now() + '_' + Math.random().toString(36).slice(2);

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['log','today','monthly','export'][i] === name);
  });
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'today')   renderToday();
  if (name === 'monthly') renderMonthly();
  if (name === 'export')  renderExport();
}

// ── Location & Product selectors ────────────────────────────────────────────
function setLoc(loc) {
  currentLoc = loc;
  document.getElementById('loc-f3').classList.toggle('active',   loc === 'f3');
  document.getElementById('loc-farm').classList.toggle('active', loc === 'farm');
}

function setProduct(prod) {
  currentProduct = prod;
  ['eggs','chicken','veg'].forEach(p => {
    document.getElementById('prod-' + p).classList.toggle('active', p === prod);
    document.getElementById('inputs-' + p).style.display = p === prod ? 'block' : 'none';
  });
  if (prod === 'veg') renderVegGrid();
}

// ── Veg grid ───────────────────────────────────────────────────────────────
function renderVegGrid() {
  selectedVeg = null;
  const grid        = document.getElementById('veg-grid');
  const customNames = loadCustomVeg();

  const fixedHtml = VEG_PRODUCTS.map(vp => `
    <div class="veg-product" id="vp-${vp.id}">
      <div class="veg-name">${vp.name}</div>
      <div class="veg-tiers">
        ${vp.prices.map(t => `
          <button class="veg-tier" onclick="selectVeg('${vp.id}',${t.qty},${t.price})">
            ${t.qty} · $${t.price}
          </button>`).join('')}
        <button class="veg-tier" onclick="selectVegCustom('${vp.id}')">Custom</button>
      </div>
    </div>`).join('');

  const customHtml = CUSTOM_VEG_IDS.map((id, i) => `
    <div class="veg-product" id="vp-${id}">
      <input type="text" value="${customNames[i].replace(/"/g,'&quot;')}"
             placeholder="Product name…"
             style="width:100%;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;
                    font-size:13px;font-weight:700;margin-bottom:8px;background:transparent"
             onchange="saveCustomVegName(${i}, this.value); document.querySelector('#vp-${id} .veg-name-label').textContent = this.value || 'Custom ${i+1}'"
             onclick="event.stopPropagation()">
      <div class="veg-tiers">
        ${CUSTOM_VEG_PRICES.map(t => `
          <button class="veg-tier" onclick="selectVeg('${id}',${t.qty},${t.price})">
            ${t.qty} · $${t.price}
          </button>`).join('')}
        <button class="veg-tier" onclick="selectVegCustom('${id}')">Custom</button>
      </div>
    </div>`).join('');

  grid.innerHTML = fixedHtml + customHtml;
  document.getElementById('veg-custom-wrap').style.display = 'none';
}

function selectVeg(vegId, qty, price) {
  selectedVeg = { vegId, qty, price };
  // Highlight selected card + tier
  document.querySelectorAll('.veg-product').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.veg-tier').forEach(el => el.classList.remove('active'));
  document.getElementById('vp-' + vegId).classList.add('selected');
  event.target.classList.add('active');
  document.getElementById('veg-custom-wrap').style.display = 'none';
}

function selectVegCustom(vegId) {
  selectedVeg = { vegId, qty: null, price: null, custom: true };
  document.querySelectorAll('.veg-product').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.veg-tier').forEach(el => el.classList.remove('active'));
  document.getElementById('vp-' + vegId).classList.add('selected');
  event.target.classList.add('active');
  document.getElementById('veg-custom-wrap').style.display = 'block';
  document.getElementById('veg-custom-qty').value   = '';
  document.getElementById('veg-custom-price').value = '';
}

// ── Log Sale ───────────────────────────────────────────────────────────────
function updateCustomerSuggestions() {
  const sales   = load();
  const names   = [...new Set(sales.map(s => s.customerName).filter(Boolean))].sort();
  const dl      = document.getElementById('customer-suggestions');
  if (dl) dl.innerHTML = names.map(n => `<option value="${n.replace(/"/g,'&quot;')}">`).join('');
}

function logSale() {
  const notes        = document.getElementById('sale-notes').value.trim();
  const customerName = document.getElementById('sale-customer').value.trim();
  let sale = { id: uid(), ts: Date.now(), location: currentLoc, product: currentProduct, notes, customerName };

  if (currentProduct === 'eggs') {
    const qty   = parseFloat(document.getElementById('eggs-qty').value);
    const price = parseFloat(document.getElementById('eggs-price').value);
    if (!qty || qty <= 0)  { toast('⚠ Enter dozens'); return; }
    if (!price || price <= 0) { toast('⚠ Enter price'); return; }
    sale.qty   = qty;
    sale.price = price;
    sale.total = Math.round(qty * price * 100) / 100;
    document.getElementById('eggs-qty').value = '';

  } else if (currentProduct === 'chicken') {
    const qty   = parseFloat(document.getElementById('chicken-qty').value);
    const price = parseFloat(document.getElementById('chicken-price').value);
    if (!qty || qty <= 0)  { toast('⚠ Enter weight'); return; }
    if (!price || price <= 0) { toast('⚠ Enter price'); return; }
    sale.qty   = qty;
    sale.price = price;
    sale.total = Math.round(qty * price * 100) / 100;
    document.getElementById('chicken-qty').value = '';

  } else if (currentProduct === 'veg') {
    if (!selectedVeg) { toast('⚠ Select a product'); return; }
    let qty, price;
    if (selectedVeg.custom) {
      qty   = parseFloat(document.getElementById('veg-custom-qty').value);
      price = parseFloat(document.getElementById('veg-custom-price').value);
      if (!qty || qty <= 0)   { toast('⚠ Enter qty'); return; }
      if (!price || price < 0) { toast('⚠ Enter price'); return; }
    } else {
      qty   = selectedVeg.qty;
      price = selectedVeg.price;
    }
    sale.vegId = selectedVeg.vegId;
    sale.qty   = qty;
    sale.price = price;
    sale.total = Math.round(qty * price * 100) / 100;
    renderVegGrid(); // reset selection
  }

  document.getElementById('sale-notes').value    = '';
  document.getElementById('sale-customer').value = '';
  const sales = load();
  sales.push(sale);
  save(sales);
  updateCustomerSuggestions();
  toast(`✓ Sale logged · $${sale.total.toFixed(2)}`);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtMoney(n) { return '$' + n.toFixed(2); }
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}
function vegName(id) {
  const fixed = VEG_PRODUCTS.find(v => v.id === id);
  if (fixed) return fixed.name;
  const idx = CUSTOM_VEG_IDS.indexOf(id);
  if (idx !== -1) {
    const name = loadCustomVeg()[idx];
    return name || `Custom ${idx + 1}`;
  }
  return id;
}
function saleLabel(s) {
  if (s.product === 'eggs')    return `Eggs · ${s.qty} doz @ $${s.price}/doz`;
  if (s.product === 'chicken') return `Chicken · ${s.qty} lbs @ $${s.price}/lb`;
  if (s.product === 'veg')     return `${vegName(s.vegId)} · ${s.qty} @ $${s.price}`;
  return s.product;
}
function locLabel(l) { return l === 'f3' ? 'F3' : 'On-Farm'; }

function isSameDay(ts, date) {
  const d = new Date(ts);
  return d.getFullYear() === date.getFullYear() &&
         d.getMonth()    === date.getMonth() &&
         d.getDate()     === date.getDate();
}
function isSameMonth(ts, date) {
  const d = new Date(ts);
  return d.getFullYear() === date.getFullYear() &&
         d.getMonth()    === date.getMonth();
}

// ── Customer repeat detection ──────────────────────────────────────────────
function isRepeatCustomer(s, allSales) {
  if (!s.customerName) return false;
  const n = s.customerName.toLowerCase().trim();
  return allSales.some(other => other.id !== s.id && other.ts < s.ts &&
    other.customerName && other.customerName.toLowerCase().trim() === n);
}

function customerTag(s, allSales) {
  if (!s.customerName) return '';
  const repeat = isRepeatCustomer(s, allSales);
  return ` · <span class="tag ${repeat ? 'tag-blue' : 'tag-green'}" style="font-size:11px">${s.customerName}${repeat ? ' ↩' : ' ★'}</span>`;
}

// ── Delete sale ────────────────────────────────────────────────────────────
function deleteSale(id) {
  const sales = load().filter(s => s.id !== id);
  save(sales);
  renderToday();
  renderMonthly();
}

// ── Today ──────────────────────────────────────────────────────────────────
function renderToday() {
  const today    = new Date();
  const allSales = load();
  const sales    = allSales.filter(s => isSameDay(s.ts, today));
  const el    = document.getElementById('today-content');

  if (!sales.length) {
    el.innerHTML = `<div class="empty"><div class="ico">🐓</div>No sales logged today.</div>`;
    return;
  }

  const total   = sales.reduce((a, s) => a + s.total, 0);
  const f3Total = sales.filter(s => s.location==='f3').reduce((a,s) => a+s.total, 0);
  const fmTotal = sales.filter(s => s.location==='farm').reduce((a,s) => a+s.total, 0);

  el.innerHTML = `
    <div class="card">
      <div class="card-title">${today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      <div class="summary-row"><span>F3 Sales</span><span>${fmtMoney(f3Total)}</span></div>
      <div class="summary-row"><span>On-Farm Sales</span><span>${fmtMoney(fmTotal)}</span></div>
      <div class="divider"></div>
      <div class="summary-row total"><span>Total</span><span>${fmtMoney(total)}</span></div>
    </div>
    <div class="card">
      <div class="card-title">Sales (${sales.length})</div>
      ${sales.slice().reverse().map(s => `
        <div class="sale-item">
          <div>
            <div class="sale-main">${saleLabel(s)}</div>
            <div class="sale-meta">
              <span class="tag ${s.location==='f3'?'tag-green':'tag-amber'}">${locLabel(s.location)}</span>
              · ${fmtTime(s.ts)}
              ${customerTag(s, allSales)}
              ${s.notes ? ' · ' + s.notes : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="sale-price">${fmtMoney(s.total)}</span>
            <button class="btn-danger" onclick="deleteSale('${s.id}')">×</button>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── Monthly ────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + dir, 1);
  renderMonthly();
}

function renderMonthly() {
  const label    = viewMonth.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  document.getElementById('month-label').textContent = label;

  const allSales = load();
  const sales    = allSales.filter(s => isSameMonth(s.ts, viewMonth));
  const el    = document.getElementById('monthly-content');

  if (!sales.length) {
    el.innerHTML = `<div class="empty"><div class="ico">📊</div>No sales in ${label}.</div>`;
    return;
  }

  const total   = sales.reduce((a,s) => a+s.total, 0);
  const byProd  = {};
  sales.forEach(s => {
    const k = s.product === 'veg' ? vegName(s.vegId) : s.product.charAt(0).toUpperCase()+s.product.slice(1);
    byProd[k] = (byProd[k]||0) + s.total;
  });

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Summary</div>
      ${Object.entries(byProd).map(([k,v]) =>
        `<div class="summary-row"><span>${k}</span><span>${fmtMoney(v)}</span></div>`
      ).join('')}
      <div class="divider"></div>
      <div class="summary-row total"><span>Total</span><span>${fmtMoney(total)}</span></div>
    </div>
    <div class="card">
      <div class="card-title">All Sales (${sales.length})</div>
      ${sales.slice().reverse().map(s => `
        <div class="sale-item">
          <div>
            <div class="sale-main">${saleLabel(s)}</div>
            <div class="sale-meta">
              <span class="tag ${s.location==='f3'?'tag-green':'tag-amber'}">${locLabel(s.location)}</span>
              · ${fmtDate(s.ts)} ${fmtTime(s.ts)}
              ${customerTag(s, allSales)}
              ${s.notes ? ' · ' + s.notes : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="sale-price">${fmtMoney(s.total)}</span>
            <button class="btn-danger" onclick="deleteSale('${s.id}');renderMonthly()">×</button>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── Export ─────────────────────────────────────────────────────────────────
function renderExport() {
  const sales = load();
  const el    = document.getElementById('export-content');

  if (!sales.length) {
    el.innerHTML = `<div class="empty"><div class="ico">📤</div>No sales to export yet.</div>`;
    return;
  }

  // Group by month
  const months = {};
  sales.forEach(s => {
    const d = new Date(s.ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = [];
    months[key].push(s);
  });

  let html = '';
  Object.entries(months).sort().reverse().forEach(([key, msales]) => {
    const [yr, mo] = key.split('-');
    const label = new Date(parseInt(yr), parseInt(mo)-1, 1)
      .toLocaleDateString('en-US', {month:'long', year:'numeric'});

    const eggDoz   = msales.filter(s=>s.product==='eggs').reduce((a,s)=>a+s.qty,0);
    const eggRev   = msales.filter(s=>s.product==='eggs').reduce((a,s)=>a+s.total,0);
    const ckLbs    = msales.filter(s=>s.product==='chicken').reduce((a,s)=>a+s.qty,0);
    const ckRev    = msales.filter(s=>s.product==='chicken').reduce((a,s)=>a+s.total,0);
    const vegRev   = msales.filter(s=>s.product==='veg').reduce((a,s)=>a+s.total,0);
    const totalRev = msales.reduce((a,s)=>a+s.total,0);

    const byVeg = {};
    msales.filter(s=>s.product==='veg').forEach(s => {
      const n = vegName(s.vegId);
      if (!byVeg[n]) byVeg[n] = {qty:0, rev:0};
      byVeg[n].qty += s.qty;
      byVeg[n].rev += s.total;
    });

    const lines = [
      `Month: ${label}`,
      ``,
      `EGGS`,
      `  Dozens sold:  ${eggDoz.toFixed(1)}`,
      `  Revenue:      $${eggRev.toFixed(2)}`,
      ``,
      `CHICKEN`,
      `  Lbs sold:     ${ckLbs.toFixed(1)}`,
      `  Revenue:      $${ckRev.toFixed(2)}`,
      ``,
      `VEG  (Revenue: $${vegRev.toFixed(2)})`,
      ...Object.entries(byVeg).map(([n,d]) => `  ${n}: ${d.qty} units · $${d.rev.toFixed(2)}`),
      ``,
      `TOTAL REVENUE:  $${totalRev.toFixed(2)}`,
    ].join('\n');

    html += `
      <div class="export-section">
        <h3>${label}</h3>
        <div class="export-box" id="export-${key}">${lines}</div>
        <button class="btn-copy" style="margin-top:8px" onclick="copyExport('${key}')">Copy</button>
      </div>`;
  });

  el.innerHTML = html;
}

function copyExport(key) {
  const text = document.getElementById('export-' + key).textContent;
  navigator.clipboard.writeText(text).then(() => toast('✓ Copied to clipboard'));
}

renderVegGrid();
updateCustomerSuggestions();
viewMonth = new Date();
document.getElementById('month-label').textContent =
  viewMonth.toLocaleDateString('en-US', {month:'long', year:'numeric'});
</script>
